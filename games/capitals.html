<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계 수도 퀴즈 · 학습 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#000d05;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.top-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.07)}
.back{color:#4ade80;text-decoration:none;font-size:14px;font-weight:700}
.stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-v{font-size:18px;font-weight:900;color:#4ade80}
.stat-l{font-size:11px;color:rgba(255,255,255,.4)}

.game-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;width:100%;max-width:520px;gap:24px}

.progress-bar{width:100%;height:8px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#166534,#4ade80);transition:width .4s}

.country-card{
  background:#0a1f0e;border:1px solid rgba(74,222,128,.2);border-radius:20px;
  padding:36px 40px;text-align:center;width:100%;
}
.flag{font-size:64px;line-height:1;margin-bottom:12px}
.country-name{font-size:clamp(20px,5vw,30px);font-weight:900;margin-bottom:6px}
.q-lbl{font-size:14px;color:rgba(255,255,255,.4)}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.choice{
  background:#0a1f0e;border:2px solid rgba(74,222,128,.15);border-radius:14px;
  padding:16px;font-size:16px;font-weight:700;cursor:pointer;color:#fff;
  font-family:inherit;transition:all .15s;text-align:center;line-height:1.4;
}
.choice:hover{border-color:rgba(74,222,128,.5);background:#0d2912}
.choice.correct{background:rgba(74,222,128,.2)!important;border-color:#4ade80!important;color:#4ade80!important}
.choice.wrong{background:rgba(248,113,113,.15)!important;border-color:#f87171!important;color:#f87171!important}

.explain{
  background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15);
  border-radius:12px;padding:14px 18px;font-size:14px;color:rgba(255,255,255,.6);
  text-align:center;min-height:52px;line-height:1.7;width:100%;
}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);align-items:center;justify-content:center;z-index:50}
.overlay.show{display:flex}
.modal{background:#001a08;border:1px solid rgba(74,222,128,.4);border-radius:20px;padding:40px 48px;text-align:center;max-width:380px;width:90%}
.modal h2{font-size:28px;font-weight:900;margin-bottom:10px}
.big-score{font-size:52px;font-weight:900;color:#4ade80;margin:12px 0}
.modal p{color:rgba(255,255,255,.6);margin-bottom:8px;font-size:15px;line-height:1.7}
.result-list{text-align:left;max-height:200px;overflow-y:auto;margin-bottom:20px;font-size:13px;line-height:1.8;color:rgba(255,255,255,.5)}
.result-list .ok{color:#4ade80}
.result-list .ng{color:#f87171}
.btn{background:linear-gradient(135deg,#166534,#16a34a);color:#fff;border:none;padding:12px 32px;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin:4px}
.btn-out{background:rgba(255,255,255,.08);color:#fff;text-decoration:none;display:inline-block;padding:12px 32px;border-radius:999px;font-size:15px;font-weight:700;margin:4px}
</style>
</head>
<body>
<div class="top-bar">
  <a href="../index.html" class="back">← 목록</a>
  <span style="font-size:16px;font-weight:700">🌍 세계 수도 퀴즈</span>
  <div class="stats">
    <div class="stat"><div class="stat-v" id="score">0</div><div class="stat-l">점수</div></div>
    <div class="stat"><div class="stat-v" id="q-num">0</div><div class="stat-l">/ 10</div></div>
  </div>
</div>

<div class="game-wrap">
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
  <div class="country-card">
    <div class="flag" id="flag">🌍</div>
    <div class="country-name" id="country">?</div>
    <div class="q-lbl">의 수도는?</div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="explain" id="explain">정답을 선택하면 설명이 나타납니다.</div>
</div>

<div class="overlay show" id="overlay">
  <div class="modal" id="modal">
    <h2>🌍 세계 수도</h2>
    <p>세계 각국의 수도를 맞혀보세요!<br>10문제 4지선다 퀴즈입니다.</p>
    <button class="btn" onclick="startGame()">시작!</button>
    <a href="../index.html" class="btn-out">목록으로</a>
  </div>
</div>

<script>
const DATA=[
  {flag:'🇰🇷',country:'대한민국',capital:'서울',note:'대한민국의 수도 서울은 약 600년간 조선왕조의 수도였습니다.'},
  {flag:'🇯🇵',country:'일본',capital:'도쿄',note:'도쿄는 에도 시대 이후 일본의 중심지로, 세계 최대 도시 중 하나입니다.'},
  {flag:'🇨🇳',country:'중국',capital:'베이징',note:'베이징은 명·청나라의 수도로 약 800년의 역사를 자랑합니다.'},
  {flag:'🇫🇷',country:'프랑스',capital:'파리',note:'파리는 에펠탑으로 유명하며 세계 패션·예술의 중심지입니다.'},
  {flag:'🇩🇪',country:'독일',capital:'베를린',note:'베를린은 통일 독일의 수도로, 냉전 시대 분단의 상징이었습니다.'},
  {flag:'🇧🇷',country:'브라질',capital:'브라질리아',note:'브라질리아는 1960년에 새로 건설된 계획도시 수도입니다.'},
  {flag:'🇦🇺',country:'호주',capital:'캔버라',note:'많은 사람들이 시드니를 수도로 알지만, 실제 수도는 캔버라입니다.'},
  {flag:'🇺🇸',country:'미국',capital:'워싱턴 D.C.',note:'워싱턴 D.C.는 건국의 아버지 조지 워싱턴의 이름을 딴 계획도시입니다.'},
  {flag:'🇷🇺',country:'러시아',capital:'모스크바',note:'모스크바는 세계 최대 면적 국가 러시아의 수도입니다.'},
  {flag:'🇨🇦',country:'캐나다',capital:'오타와',note:'많은 사람들이 토론토나 밴쿠버가 수도라 생각하지만 실제는 오타와입니다.'},
  {flag:'🇮🇹',country:'이탈리아',capital:'로마',note:'로마는 고대 로마 제국의 심장부로 "영원의 도시"라 불립니다.'},
  {flag:'🇪🇸',country:'스페인',capital:'마드리드',note:'마드리드는 스페인 중앙부에 위치한 유럽 최고 고도의 수도입니다.'},
  {flag:'🇲🇽',country:'멕시코',capital:'멕시코시티',note:'멕시코시티는 아즈텍 제국의 수도 테노치티틀란 자리에 세워졌습니다.'},
  {flag:'🇿🇦',country:'남아프리카공화국',capital:'프리토리아',note:'남아공은 프리토리아(행정), 케이프타운(입법), 블룸폰테인(사법) 세 수도를 가집니다.'},
  {flag:'🇪🇬',country:'이집트',capital:'카이로',note:'카이로는 아프리카에서 가장 인구가 많은 도시이며 피라미드 근처에 있습니다.'},
];

let qNum=0,score=0,qs=[],results=[],locked=false;
const TOTAL=10;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startGame(){
  document.getElementById('overlay').classList.remove('show');
  qNum=0;score=0;results=[];
  qs=shuffle([...DATA]).slice(0,TOTAL);
  document.getElementById('score').textContent='0';
  nextQ();
}

function nextQ(){
  if(qNum>=TOTAL){endGame();return;}
  locked=false;
  const q=qs[qNum++];
  document.getElementById('q-num').textContent=qNum;
  document.getElementById('prog').style.width=(qNum/TOTAL*100)+'%';
  document.getElementById('flag').textContent=q.flag;
  document.getElementById('country').textContent=q.country;
  document.getElementById('explain').textContent='정답을 선택하면 설명이 나타납니다.';

  // 3 wrong answers
  const wrongs=shuffle(DATA.filter(d=>d.capital!==q.capital)).slice(0,3).map(d=>d.capital);
  const opts=shuffle([q.capital,...wrongs]);
  const c=document.getElementById('choices');
  c.innerHTML='';
  opts.forEach(cap=>{
    const btn=document.createElement('button');
    btn.className='choice';btn.textContent=cap;
    btn.onclick=()=>pick(btn,cap===q.capital,q);
    c.appendChild(btn);
  });
}

function pick(btn,correct,q){
  if(locked)return;locked=true;
  if(correct){
    btn.classList.add('correct');score+=10;
    document.getElementById('score').textContent=score;
    results.push({ok:true,country:q.country,capital:q.capital});
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice').forEach(b=>{if(b.textContent===q.capital)b.classList.add('correct');});
    results.push({ok:false,country:q.country,capital:q.capital});
  }
  document.getElementById('explain').textContent=q.note;
  setTimeout(nextQ,1600);
}

function endGame(){
  const modal=document.getElementById('modal');
  const list=results.map(r=>`<div class="${r.ok?'ok':'ng'}">${r.ok?'✅':'❌'} ${r.country} → ${r.capital}</div>`).join('');
  modal.innerHTML=`<h2>🎉 완료!</h2><div class="big-score">${score}점</div>
    <p>${TOTAL}문제 중 ${score/10}개 정답</p>
    <div class="result-list">${list}</div>
    <button class="btn" onclick="startGame()">다시 하기</button>
    <a href="../index.html" class="btn-out">목록으로</a>`;
  document.getElementById('overlay').classList.add('show');
}
</script>
</body>
</html>
